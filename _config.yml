title: NexHam LLC
description: "NexHam builds production software and deploys AI-powered teams for businesses. Custom SaaS, multi-agent AI deployment, and infrastructure — built by 25 years of enterprise IT leadership."
url: https://nexhamcorp.com
baseurl: ""

# SEO / Social
tagline: "Software that works. AI that delivers."
author:
  name: Darren Hamilton
  url: https://nexhamcorp.com
twitter:
  card: summary_large_image
social:
  name: NexHam LLC
  links:
    - https://nexhamcorp.com
logo: /assets/images/nexham-og.png

# Open Graph defaults
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/nexham-og.png
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: post
      image: /assets/images/nexham-og.png

# Build
markdown: kramdown
permalink: /blog/:title/
future: false

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Blog
show_excerpts: true
excerpt_separator: "<!--more-->"

# Collections
collections:
  services:
    output: false

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - node_modules
  - vendor
